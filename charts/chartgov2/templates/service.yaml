apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}
  labels:
    {{- include "chartgov2.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chartgov2.selectorLabels" . | nindent 4 }}

{{- if .Values.grpcService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-headless
  labels:
    {{- include "chartgov2.labels" . | nindent 4 }}
spec:
  clusterIP: {{ .Values.grpcService.clusterIP }}
  ports:
    - port: {{ .Values.grpcService.port }}
      targetPort: {{ .Values.grpcService.port }}
      protocol: TCP
      name: grpc
  selector:
    {{- include "chartgov2.selectorLabels" . | nindent 4 }}
{{- end }}